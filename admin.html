<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #000000; --cyan: #00e5ff; --red: #ff1a1a;
      --green: #00ff88; --white: #ffffff; --grey: #333333; --dim: #666666;
    }
    body { background: var(--black); color: var(--white); font-family: 'Space Mono', monospace; min-height: 100vh; padding: 2rem; }

    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 2rem; }
    .login-title { font-family: 'Press Start 2P', monospace; font-size: clamp(10px,2vw,14px); color: var(--cyan); letter-spacing: 0.1em; text-align: center; }
    .login-title span { color: var(--red); }
    .login-sub { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--dim); letter-spacing: 0.15em; }
    .login-form { display: flex; flex-direction: column; gap: 1rem; width: min(320px, 90vw); }
    .login-error { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--red); text-align: center; display: none; }

    input, textarea, select { background: #0a0a0a; border: 1px solid var(--grey); color: var(--white); font-family: 'Space Mono', monospace; font-size: 13px; padding: 0.75rem 1rem; width: 100%; outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus, select:focus { border-color: var(--cyan); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #111; }
    input[type="password"] { letter-spacing: 0.2em; }

    .btn { font-family: 'Press Start 2P', monospace; font-size: 9px; letter-spacing: 0.1em; padding: 0.75rem 1.5rem; cursor: pointer; border: none; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-cyan { background: var(--cyan); color: var(--black); }
    .btn-red { background: var(--red); color: var(--white); }
    .btn-green { background: var(--green); color: var(--black); }
    .btn-grey { background: var(--grey); color: var(--white); }

    #admin-screen { display: none; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--grey); }
    .admin-title { font-family: 'Press Start 2P', monospace; font-size: clamp(9px,1.5vw,12px); color: var(--cyan); }
    .admin-title span { color: var(--red); }
    .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    @media (max-width: 900px) { .admin-grid { grid-template-columns: 1fr; } }

    .panel { border: 1px solid var(--grey); padding: 1.5rem; }
    .panel-title { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--cyan); letter-spacing: 0.1em; margin-bottom: 1.5rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 0.4rem; }

    .upload-area { border: 2px dashed var(--grey); padding: 2rem; text-align: center; cursor: pointer; transition: border-color 0.2s; position: relative; }
    .upload-area:hover, .upload-area.dragover { border-color: var(--cyan); }
    .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-text { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--dim); line-height: 2; }
    .upload-preview { width: 100%; max-height: 160px; object-fit: cover; display: none; margin-bottom: 0.5rem; }
    .upload-filename { font-size: 11px; color: var(--cyan); margin-top: 0.5rem; display: none; }
    .upload-progress { height: 4px; background: var(--grey); margin-top: 0.75rem; display: none; }
    .upload-progress-bar { height: 100%; background: var(--cyan); width: 0%; transition: width 0.3s; }

    .projects-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .project-row { display: flex; align-items: center; gap: 0.75rem; border: 1px solid var(--grey); padding: 0.75rem; cursor: grab; transition: border-color 0.2s, opacity 0.2s; user-select: none; }
    .project-row:active { cursor: grabbing; }
    .project-row.dragging { opacity: 0.4; border-color: var(--cyan); }
    .project-row.drag-over { border-color: var(--cyan); border-style: dashed; }
    .project-row.hidden-card { opacity: 0.4; }
    .drag-handle { color: var(--dim); font-size: 16px; cursor: grab; flex-shrink: 0; }
    .row-thumb { width: 48px; height: 36px; object-fit: cover; flex-shrink: 0; background: #111; }
    .row-info { flex: 1; min-width: 0; }
    .row-title { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.3rem; }
    .row-category { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--cyan); }
    .row-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .toggle-btn, .delete-btn { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 0.3rem 0.5rem; cursor: pointer; border: none; letter-spacing: 0.05em; }
    .toggle-btn { background: var(--grey); color: var(--white); }
    .toggle-btn.on { background: var(--green); color: var(--black); }
    .delete-btn { background: var(--red); color: var(--white); }

    .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0a0a0a; border-top: 1px solid var(--grey); padding: 1rem 2rem; display: none; align-items: center; justify-content: space-between; z-index: 50; }
    .save-status { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--dim); }
    .save-status.saved { color: var(--green); }
    .save-status.saving { color: var(--cyan); }
    .save-status.error { color: var(--red); }
    .save-actions { display: flex; gap: 1rem; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 2rem; }
    .modal-overlay.show { display: flex; }
    .modal { background: #0a0a0a; border: 1px solid var(--cyan); padding: 2rem; width: min(400px, 100%); }
    .modal-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--red); margin-bottom: 1rem; }
    .modal-text { font-size: 12px; color: var(--dim); line-height: 1.8; margin-bottom: 1.5rem; }
    .modal-actions { display: flex; gap: 1rem; }

    .toast { position: fixed; top: 1.5rem; right: 1.5rem; font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 0.75rem 1rem; letter-spacing: 0.1em; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .toast.ok { background: var(--green); color: var(--black); }
    .toast.err { background: var(--red); color: var(--white); }

    .pb4 { padding-bottom: 5rem; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-title">ARCHIE'S <span>ARCADE</span></div>
  <div class="login-sub">ADMIN ACCESS</div>
  <div class="login-form">
    <input type="password" id="pw" placeholder="Password..." autocomplete="off">
    <button class="btn btn-cyan" onclick="login()">ENTER</button>
    <div class="login-error" id="login-err">WRONG PASSWORD.</div>
  </div>
</div>

<div id="admin-screen" class="pb4">
  <div class="admin-header">
    <div class="admin-title">ARCHIE'S <span>ARCADE</span> / ADMIN</div>
    <a href="/" class="btn btn-grey">VIEW SITE</a>
  </div>
  <div class="admin-grid">
    <div class="panel">
      <div class="panel-title">ADD NEW PROJECT</div>
      <div class="field">
        <label>THUMBNAIL / IMAGE</label>
        <div class="upload-area" id="upload-area">
          <input type="file" id="file-input" accept="image/*,video/*">
          <img class="upload-preview" id="upload-preview">
          <div class="upload-text" id="upload-text">DROP FILE HERE<br>OR CLICK TO BROWSE</div>
          <div class="upload-filename" id="upload-filename"></div>
          <div class="upload-progress" id="upload-progress"><div class="upload-progress-bar" id="upload-bar"></div></div>
        </div>
      </div>
      <div class="field"><label>TITLE</label><input type="text" id="new-title" placeholder="Project title..."></div>
      <div class="field">
        <label>CATEGORY</label>
        <select id="new-cat">
          <option value="FILM">FILM</option>
          <option value="EDIT">EDIT</option>
          <option value="ANIMATE">ANIMATE</option>
          <option value="DESIGN">DESIGN</option>
          <option value="GAME">GAME</option>
          <option value="IDEA">IDEA</option>
        </select>
      </div>
      <div class="field"><label>DESCRIPTION</label><textarea id="new-desc" placeholder="Tell them about it..."></textarea></div>
      <div class="field"><label>VIMEO ID (OPTIONAL)</label><input type="text" id="new-vimeo" placeholder="e.g. 123456789"></div>
      <div class="field"><label>YOUTUBE ID (OPTIONAL)</label><input type="text" id="new-yt" placeholder="e.g. dQw4w9WgXcQ"></div>
      <button class="btn btn-cyan" style="width:100%;margin-top:0.5rem" id="add-btn" onclick="addProject()">ADD TO ARCADE</button>
    </div>
    <div class="panel">
      <div class="panel-title">MANAGE PROJECTS</div>
      <div class="projects-list" id="projects-list"></div>
    </div>
  </div>
</div>

<div class="save-bar" id="save-bar">
  <div class="save-status" id="save-status">UNSAVED CHANGES</div>
  <div class="save-actions">
    <button class="btn btn-grey" onclick="loadProjects()">DISCARD</button>
    <button class="btn btn-green" id="save-btn" onclick="saveProjects()">SAVE CHANGES</button>
  </div>
</div>

<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <div class="modal-title">DELETE PROJECT?</div>
    <div class="modal-text" id="del-text"></div>
    <div class="modal-actions">
      <button class="btn btn-grey" onclick="closeModal()">CANCEL</button>
      <button class="btn btn-red" onclick="confirmDelete()">DELETE</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let password = '';
  let projects = [];
  let hasChanges = false;
  let deleteIndex = null;
  let dragSrcIndex = null;
  let uploadedFile = null;
  let uploadedUrl = null;

  // LOGIN
  function login() {
    password = document.getElementById('pw').value;
    document.getElementById('pw').value = '';
    fetch('/.netlify/functions/admin', {
      method: 'POST',
      body: JSON.stringify({ action: 'get', password })
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById('login-err').style.display = 'block';
        password = '';
        return;
      }
      projects = data.projects || [];
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      document.getElementById('save-bar').style.display = 'flex';
      renderList();
      setStatus('ALL SAVED', 'saved');
    })
    .catch(() => { document.getElementById('login-err').style.display = 'block'; password = ''; });
  }

  document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

  // LOAD
  function loadProjects() {
    fetch('/.netlify/functions/admin', {
      method: 'POST',
      body: JSON.stringify({ action: 'get', password })
    })
    .then(r => r.json())
    .then(data => {
      projects = data.projects || [];
      hasChanges = false;
      renderList();
      setStatus('ALL SAVED', 'saved');
    });
  }

  // RENDER
  function renderList() {
    const list = document.getElementById('projects-list');
    list.innerHTML = '';
    if (!projects.length) {
      list.innerHTML = '<div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:var(--dim);text-align:center;padding:2rem">NO PROJECTS YET</div>';
      return;
    }
    projects.forEach((p, i) => {
      const row = document.createElement('div');
      row.className = 'project-row' + (p.hidden ? ' hidden-card' : '');
      row.draggable = true;
      row.dataset.index = i;
      const thumb = p.thumbnail ? `<img class="row-thumb" src="${p.thumbnail}" onerror="this.style.background='#222'">` : `<div class="row-thumb"></div>`;
      row.innerHTML = `
        <div class="drag-handle">⠿</div>
        ${thumb}
        <div class="row-info">
          <div class="row-title">${p.title}</div>
          <div class="row-category">${p.category}</div>
        </div>
        <div class="row-actions">
          <button class="toggle-btn ${p.hidden ? '' : 'on'}" onclick="toggleProject(${i})">${p.hidden ? 'OFF' : 'ON'}</button>
          <button class="delete-btn" onclick="promptDelete(${i})">DEL</button>
        </div>`;
      row.addEventListener('dragstart', () => { dragSrcIndex = i; setTimeout(() => row.classList.add('dragging'), 0); });
      row.addEventListener('dragend', () => row.classList.remove('dragging'));
      row.addEventListener('dragover', e => { e.preventDefault(); document.querySelectorAll('.project-row').forEach(r => r.classList.remove('drag-over')); row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', e => {
        e.preventDefault(); row.classList.remove('drag-over');
        if (dragSrcIndex !== null && dragSrcIndex !== i) {
          const moved = projects.splice(dragSrcIndex, 1)[0];
          projects.splice(i, 0, moved);
          dragSrcIndex = null; markChanged(); renderList();
        }
      });
      list.appendChild(row);
    });
  }

  function toggleProject(i) { projects[i].hidden = !projects[i].hidden; markChanged(); renderList(); }

  function promptDelete(i) {
    deleteIndex = i;
    document.getElementById('del-text').textContent = `Delete "${projects[i].title}"? This can't be undone.`;
    document.getElementById('del-modal').classList.add('show');
  }
  function closeModal() { document.getElementById('del-modal').classList.remove('show'); deleteIndex = null; }
  function confirmDelete() { if (deleteIndex !== null) { projects.splice(deleteIndex, 1); markChanged(); renderList(); } closeModal(); }

  // FILE UPLOAD
  const fileInput = document.getElementById('file-input');
  const uploadArea = document.getElementById('upload-area');
  fileInput.addEventListener('change', handleFile);
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files[0]) { fileInput.files = e.dataTransfer.files; handleFile(); } });

  function handleFile() {
    const file = fileInput.files[0];
    if (!file) return;
    uploadedFile = file;
    uploadedUrl = null;
    document.getElementById('upload-filename').textContent = file.name;
    document.getElementById('upload-filename').style.display = 'block';
    if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        const preview = document.getElementById('upload-preview');
        preview.src = e.target.result;
        preview.style.display = 'block';
        document.getElementById('upload-text').style.display = 'none';
      };
      reader.readAsDataURL(file);
    } else {
      document.getElementById('upload-text').textContent = 'VIDEO READY TO UPLOAD';
    }
  }

  async function uploadFile() {
    if (!uploadedFile) return null;
    const progress = document.getElementById('upload-progress');
    const bar = document.getElementById('upload-bar');
    progress.style.display = 'block';
    bar.style.width = '30%';

    const reader = new FileReader();
    const base64 = await new Promise(res => {
      reader.onload = e => res(e.target.result.split(',')[1]);
      reader.readAsDataURL(uploadedFile);
    });

    bar.style.width = '60%';

    const result = await fetch('/.netlify/functions/admin', {
      method: 'POST',
      body: JSON.stringify({ action: 'upload', password, fileBase64: base64, fileName: uploadedFile.name, mimeType: uploadedFile.type })
    }).then(r => r.json());

    bar.style.width = '100%';
    setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0%'; }, 500);

    if (result.error) throw new Error(result.error);
    return result.url;
  }

  // ADD PROJECT
  async function addProject() {
    const title = document.getElementById('new-title').value.trim();
    const category = document.getElementById('new-cat').value;
    const desc = document.getElementById('new-desc').value.trim();
    const vimeo = document.getElementById('new-vimeo').value.trim();
    const youtube = document.getElementById('new-yt').value.trim();

    if (!title) { showToast('ADD A TITLE FIRST', 'err'); return; }
    if (!uploadedFile && !vimeo && !youtube) { showToast('ADD A FILE OR VIDEO ID', 'err'); return; }

    const addBtn = document.getElementById('add-btn');
    addBtn.disabled = true;
    addBtn.textContent = 'UPLOADING...';

    try {
      let thumbnailUrl = '';
      if (uploadedFile) {
        thumbnailUrl = await uploadFile();
        uploadedUrl = thumbnailUrl;
      }

      const id = title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      const project = { id, title, category, thumbnail: thumbnailUrl, description: desc, hidden: false };
      if (vimeo) project.vimeo = vimeo;
      if (youtube) project.youtube = youtube;

      projects.unshift(project);
      markChanged();
      renderList();
      resetForm();
      showToast('PROJECT ADDED', 'ok');

      // Auto-save
      await saveProjects();

    } catch(err) {
      showToast('UPLOAD FAILED', 'err');
      console.error(err);
    } finally {
      addBtn.disabled = false;
      addBtn.textContent = 'ADD TO ARCADE';
    }
  }

  function resetForm() {
    document.getElementById('new-title').value = '';
    document.getElementById('new-desc').value = '';
    document.getElementById('new-vimeo').value = '';
    document.getElementById('new-yt').value = '';
    document.getElementById('upload-preview').style.display = 'none';
    document.getElementById('upload-text').style.display = 'block';
    document.getElementById('upload-text').textContent = 'DROP FILE HERE\nOR CLICK TO BROWSE';
    document.getElementById('upload-filename').style.display = 'none';
    fileInput.value = '';
    uploadedFile = null;
    uploadedUrl = null;
  }

  // SAVE
  async function saveProjects() {
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    setStatus('SAVING...', 'saving');
    try {
      const result = await fetch('/.netlify/functions/admin', {
        method: 'POST',
        body: JSON.stringify({ action: 'save', password, projects })
      }).then(r => r.json());
      if (result.error) throw new Error(result.error);
      hasChanges = false;
      setStatus('ALL SAVED -- DEPLOYING...', 'saved');
      showToast('SAVED -- LIVE IN 30 SECONDS', 'ok');
      setTimeout(() => setStatus('ALL SAVED', 'saved'), 5000);
    } catch(err) {
      setStatus('SAVE FAILED', 'error');
      showToast('SAVE FAILED', 'err');
    } finally {
      btn.disabled = false;
    }
  }

  function markChanged() { hasChanges = true; setStatus('UNSAVED CHANGES'); }
  function setStatus(msg, type = '') {
    const el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status ' + type;
  }

  function showToast(msg, type = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    setTimeout(() => t.className = `toast ${type}`, 2500);
  }
</script>
</body>
</html>
